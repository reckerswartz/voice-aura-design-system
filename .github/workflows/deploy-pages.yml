name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/site _site/dist/css _site/assets
          # Copy HTML pages
          cp site/*.html _site/site/
          # Copy built CSS
          cp dist/css/voice-aura.css _site/dist/css/
          cp dist/css/voice-aura.min.css _site/dist/css/
          # Copy all SVG assets (preserving directory structure)
          cp -r assets/* _site/assets/
          # Copy the landing page to site root
          cp site/index.html _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
