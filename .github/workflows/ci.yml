# Voice Aura Design System — CI Pipeline
# Runs on every push and pull request to main.
# Steps: lint SCSS, build CSS (Sass + PostCSS), check size budget.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint SCSS
        run: npm run lint

      - name: Build CSS (Sass + PostCSS)
        run: npm run build

      - name: Size budget check
        run: npm run test:size

      - name: Upload CSS artifacts
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: css-dist
          path: dist/css/
          retention-days: 7
