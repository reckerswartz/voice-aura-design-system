# Voice Aura Design System — CI Pipeline
# Runs on every push and pull request to main.
# Jobs:
#   1. build — lint SCSS, build CSS (Sass + PostCSS), check size budget (Node 20 + 22)
#   2. test  — accessibility audits via Playwright + axe-core (Node 22 only)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint SCSS
        run: npm run lint

      - name: Build CSS (Sass + PostCSS)
        run: npm run build

      - name: Size budget check
        run: npm run test:size

      - name: Upload CSS artifacts
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: css-dist
          path: dist/css/
          retention-days: 7

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Accessibility tests (axe-core)
        run: npx playwright test tests/a11y.spec.js --project "Desktop Chrome"
