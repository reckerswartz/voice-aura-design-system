  <rect x="200" y="60" width="40" height="5" rx="2.5" fill="#1A1919" opacity="0.10"/>
  <!-- Waveform visualization bars -->
  <rect x="55" y="180" width="4" height="50" rx="2" fill="#0478FF" opacity="0.30"/>
  <rect x="67" y="160" width="4" height="90" rx="2" fill="#0478FF" opacity="0.45"/>
  <rect x="79" y="175" width="4" height="60" rx="2" fill="#0478FF" opacity="0.25"/>
  <rect x="91" y="150" width="4" height="110" rx="2" fill="#0478FF" opacity="0.50"/>
  <rect x="103" y="165" width="4" height="80" rx="2" fill="#0478FF" opacity="0.35"/>
  <rect x="115" y="145" width="4" height="120" rx="2" fill="#0478FF" opacity="0.55"/>
  <rect x="127" y="170" width="4" height="70" rx="2" fill="#0478FF" opacity="0.30"/>
  <rect x="139" y="155" width="4" height="100" rx="2" fill="#0478FF" opacity="0.40"/>
  <rect x="151" y="175" width="4" height="60" rx="2" fill="#0478FF" opacity="0.25"/>
  <rect x="163" y="160" width="4" height="90" rx="2" fill="#0478FF" opacity="0.45"/>
  <rect x="175" y="180" width="4" height="50" rx="2" fill="#0478FF" opacity="0.20"/>
  <rect x="187" y="165" width="4" height="80" rx="2" fill="#0478FF" opacity="0.35"/>
