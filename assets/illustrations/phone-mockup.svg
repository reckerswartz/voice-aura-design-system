  <circle cx="140" cy="380" r="28" fill="#0478FF"/>
  <!-- Mic icon in button -->
  <rect x="134" y="366" width="12" height="16" rx="6" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  <path d="M130 382 A10 10 0 0 0 150 382" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  <line x1="140" y1="392" x2="140" y2="396" stroke="#FFFFFF" stroke-width="1.5"/>
