<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D6B8"/>
      <stop offset="100%" stop-color="#E8C4A0"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C1810"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F0F0"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <g clip-path="url(#circle)">
    <!-- Shoulders / Top -->
    <ellipse cx="100" cy="215" rx="75" ry="50" fill="#F8F8F8"/>
    <ellipse cx="100" cy="215" rx="68" ry="45" fill="#FFFFFF"/>

    <!-- Neck -->
    <rect x="85" y="145" width="30" height="25" rx="4" fill="url(#skin)"/>

    <!-- Face -->
    <ellipse cx="100" cy="105" rx="45" ry="52" fill="url(#skin)"/>

    <!-- Hair - back -->
    <ellipse cx="100" cy="72" rx="48" ry="38" fill="url(#hair)"/>
    <!-- Hair - sides flowing down -->
    <path d="M52 72 C50 85, 48 110, 55 135 C58 142, 62 140, 60 130 C56 110, 58 90, 60 80 Z" fill="url(#hair)"/>
    <path d="M148 72 C150 85, 152 110, 145 135 C142 142, 138 140, 140 130 C144 110, 142 90, 140 80 Z" fill="url(#hair)"/>
    <!-- Hair - fringe/bangs -->
    <path d="M60 72 C62 60, 75 50, 100 48 C125 50, 138 60, 140 72 C138 65, 125 56, 100 54 C75 56, 62 65, 60 72 Z" fill="#1A0E08"/>
    <!-- Hair parting detail -->
    <path d="M85 55 C90 48, 100 46, 110 48" fill="none" stroke="#3D2517" stroke-width="0.5" opacity="0.3"/>

    <!-- Ears -->
    <ellipse cx="55" cy="108" rx="7" ry="10" fill="#E8C4A0"/>
    <ellipse cx="145" cy="108" rx="7" ry="10" fill="#E8C4A0"/>

    <!-- Eyebrows -->
    <path d="M73 90 C78 86, 86 86, 90 89" fill="none" stroke="#3D2517" stroke-width="2" stroke-linecap="round"/>
    <path d="M110 89 C114 86, 122 86, 127 90" fill="none" stroke="#3D2517" stroke-width="2" stroke-linecap="round"/>

    <!-- Eyes -->
    <ellipse cx="82" cy="100" rx="8" ry="6" fill="#FFFFFF"/>
    <ellipse cx="118" cy="100" rx="8" ry="6" fill="#FFFFFF"/>
    <circle cx="83" cy="100" r="4" fill="#3D2517"/>
    <circle cx="119" cy="100" r="4" fill="#3D2517"/>
    <circle cx="84.5" cy="98.5" r="1.5" fill="#FFFFFF"/>
    <circle cx="120.5" cy="98.5" r="1.5" fill="#FFFFFF"/>
    <!-- Eyelashes -->
    <path d="M74 97 C77 94, 87 94, 90 97" fill="none" stroke="#2C1810" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M110 97 C113 94, 123 94, 126 97" fill="none" stroke="#2C1810" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Glasses -->
    <rect x="68" y="91" width="28" height="20" rx="4" fill="none" stroke="#4A4A4A" stroke-width="2"/>
    <rect x="104" y="91" width="28" height="20" rx="4" fill="none" stroke="#4A4A4A" stroke-width="2"/>
    <line x1="96" y1="100" x2="104" y2="100" stroke="#4A4A4A" stroke-width="2"/>
    <line x1="68" y1="100" x2="55" y2="98" stroke="#4A4A4A" stroke-width="1.5"/>
    <line x1="132" y1="100" x2="145" y2="98" stroke="#4A4A4A" stroke-width="1.5"/>
    <!-- Lens reflection -->
    <path d="M72 94 L78 94" stroke="#FFFFFF" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
    <path d="M108 94 L114 94" stroke="#FFFFFF" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M98 105 C97 112, 96 118, 94 120 C96 121, 100 122, 104 120 C102 118, 101 112, 100 105" fill="none" stroke="#D4A882" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Smile -->
    <path d="M87 128 C92 134, 108 134, 113 128" fill="none" stroke="#C4957A" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Lips color hint -->
    <path d="M90 129 C95 133, 105 133, 110 129" fill="#D4908A" opacity="0.4"/>

    <!-- Headset band -->
    <path d="M48 95 C46 70, 60 42, 100 40 C140 42, 154 70, 152 95" fill="none" stroke="#333333" stroke-width="4" stroke-linecap="round"/>
    <!-- Headset padding -->
    <rect x="44" y="90" width="14" height="24" rx="7" fill="#333333"/>
    <rect x="142" y="90" width="14" height="24" rx="7" fill="#333333"/>
    <!-- Headset ear cushions -->
    <rect x="42" y="92" width="10" height="20" rx="5" fill="#555555"/>
    <rect x="148" y="92" width="10" height="20" rx="5" fill="#555555"/>

    <!-- Microphone boom -->
    <path d="M48 106 C40 112, 35 125, 42 135 C45 138, 52 140, 58 138" fill="none" stroke="#333333" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Mic capsule -->
    <ellipse cx="60" cy="137" rx="6" ry="4" fill="#444444" stroke="#333333" stroke-width="1"/>
    <ellipse cx="62" cy="137" rx="2.5" ry="3" fill="#555555"/>

    <!-- Slight blush -->
    <circle cx="72" cy="118" r="8" fill="#E8A090" opacity="0.15"/>
    <circle cx="128" cy="118" r="8" fill="#E8A090" opacity="0.15"/>

    <!-- Hand wave (right hand raised) -->
    <g transform="translate(140, 150)">
      <!-- Palm -->
      <path d="M5 15 C2 10, 0 0, 5 -5 C8 -8, 12 -6, 12 0 L12 15 Z" fill="#F0C8A8"/>
      <!-- Fingers -->
      <path d="M5 -5 C5 -12, 8 -15, 10 -12 C11 -10, 10 -5, 10 0" fill="#F0C8A8"/>
      <path d="M8 -6 C8 -14, 11 -18, 13 -14 C14 -11, 13 -6, 12 -2" fill="#F0C8A8"/>
      <path d="M11 -4 C12 -10, 15 -14, 16 -10 C17 -7, 16 -3, 14 0" fill="#F0C8A8"/>
      <!-- Thumb -->
      <path d="M3 8 C-1 6, -2 2, 0 0 C2 -1, 4 1, 4 4" fill="#F0C8A8"/>
    </g>
  </g>
</svg>
