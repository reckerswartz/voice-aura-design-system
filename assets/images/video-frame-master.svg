<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="scene" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="40%" stop-color="#2d2520"/>
      <stop offset="70%" stop-color="#1e1915"/>
      <stop offset="100%" stop-color="#0f0d0b"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="0.35" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#4a3f35" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Base dark cinematic scene -->
  <rect width="640" height="360" fill="url(#scene)"/>

  <!-- Warm spotlight from left-center -->
  <rect width="640" height="360" fill="url(#spotlight)"/>

  <!-- Ambient warm wash -->
  <rect width="640" height="360" fill="#3d3228" opacity="0.15"/>

  <!-- Silhouette figure (person, back-lit by warm light) -->
  <g>
    <!-- Head -->
    <ellipse cx="230" cy="115" rx="24" ry="28" fill="#1e1a16"/>
    <!-- Hair outline highlight -->
    <path d="M206 110 C204 90, 218 78, 240 80 C252 82, 258 94, 256 115" fill="none" stroke="#6b5842" stroke-width="1.5" opacity="0.6"/>
    <!-- Shoulders/body -->
    <path d="M196 142 C202 136, 218 132, 230 133 C242 132, 258 136, 264 142 L275 240 L185 240 Z" fill="#1e1a16"/>
    <!-- Shirt collar hint -->
    <path d="M215 143 C220 138, 240 138, 245 143" fill="none" stroke="#2a2420" stroke-width="2"/>
    <!-- Right arm -->
    <path d="M258 155 C268 148, 285 142, 298 146" fill="none" stroke="#1e1a16" stroke-width="10" stroke-linecap="round"/>
    <!-- Left arm on surface -->
    <path d="M196 158 C186 165, 175 180, 170 195" fill="none" stroke="#1e1a16" stroke-width="9" stroke-linecap="round"/>
    <!-- Warm rim light (right side) -->
    <path d="M250 92 C260 100, 265 120, 264 142" fill="none" stroke="#8a7256" stroke-width="2" opacity="0.5"/>
    <!-- Warm rim light (left side) -->
    <path d="M208 95 C202 105, 198 125, 196 142" fill="none" stroke="#6b5842" stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- Background wall/environment details -->
  <g opacity="0.08">
    <!-- Shelf or frame on wall -->
    <rect x="380" y="50" width="120" height="80" rx="2" fill="none" stroke="#8a7560" stroke-width="1.5"/>
    <rect x="520" y="40" width="80" height="100" rx="2" fill="none" stroke="#8a7560" stroke-width="1"/>
    <!-- Vertical element (door frame / column) -->
    <line x1="360" y1="0" x2="360" y2="280" stroke="#8a7560" stroke-width="2"/>
  </g>

  <!-- Ambient light streaks (window blinds effect, right side) -->
  <g opacity="0.1">
    <rect x="400" y="20" width="4" height="220" fill="#9a8870" transform="rotate(3, 400, 130)"/>
    <rect x="435" y="15" width="3" height="230" fill="#9a8870" transform="rotate(3, 435, 130)"/>
    <rect x="470" y="18" width="4" height="225" fill="#9a8870" transform="rotate(3, 470, 130)"/>
    <rect x="505" y="22" width="3" height="218" fill="#9a8870" transform="rotate(3, 505, 130)"/>
    <rect x="540" y="20" width="4" height="222" fill="#9a8870" transform="rotate(3, 540, 130)"/>
    <rect x="575" y="16" width="3" height="228" fill="#9a8870" transform="rotate(3, 575, 130)"/>
  </g>

  <!-- Desk/surface with slight reflection -->
  <path d="M0 255 L640 248 L640 360 L0 360 Z" fill="#12100e"/>
  <path d="M0 255 L640 248 L640 260 L0 267 Z" fill="#2a2420" opacity="0.3"/>

  <!-- Vignette overlay -->
  <rect width="640" height="360" fill="url(#vignette)"/>

  <!-- Film aspect ratio bars (letterbox) -->
  <rect x="0" y="0" width="640" height="10" fill="#000000" opacity="0.7"/>
  <rect x="0" y="350" width="640" height="10" fill="#000000" opacity="0.7"/>

  <!-- Bokeh light dots (out-of-focus background lights) -->
  <circle cx="420" cy="90" r="10" fill="#8a7560" opacity="0.12"/>
  <circle cx="480" cy="70" r="14" fill="#8a7560" opacity="0.08"/>
  <circle cx="540" cy="120" r="8" fill="#8a7560" opacity="0.1"/>
  <circle cx="580" cy="80" r="11" fill="#8a7560" opacity="0.07"/>
  <circle cx="390" cy="150" r="6" fill="#8a7560" opacity="0.09"/>
  <circle cx="510" cy="170" r="9" fill="#8a7560" opacity="0.07"/>
  <circle cx="460" cy="130" r="7" fill="#9a8870" opacity="0.06"/>

  <!-- Warm dust particles / floating highlights -->
  <g opacity="0.2">
    <circle cx="310" cy="75" r="1.2" fill="#C8B090"/>
    <circle cx="160" cy="130" r="1" fill="#C8B090"/>
    <circle cx="460" cy="110" r="1.5" fill="#C8B090"/>
    <circle cx="370" cy="190" r="0.8" fill="#C8B090"/>
    <circle cx="530" cy="150" r="1.2" fill="#C8B090"/>
    <circle cx="200" cy="200" r="1" fill="#C8B090"/>
    <circle cx="280" cy="160" r="0.7" fill="#C8B090"/>
    <circle cx="490" cy="85" r="1.3" fill="#C8B090"/>
  </g>
</svg>
