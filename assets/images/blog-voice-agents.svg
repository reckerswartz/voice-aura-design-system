<svg xmlns="http://www.w3.org/2000/svg" width="600" height="375" viewBox="0 0 600 375">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.45" r="0.4">
      <stop offset="0%" stop-color="#2a3a5e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="600" height="375" fill="url(#bg1)"/>
  <rect width="600" height="375" fill="url(#glow1)"/>

  <!-- Grid overlay -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.05">
    <line x1="0" y1="75" x2="600" y2="75"/><line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="225" x2="600" y2="225"/><line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="120" y1="0" x2="120" y2="375"/><line x1="240" y1="0" x2="240" y2="375"/>
    <line x1="360" y1="0" x2="360" y2="375"/><line x1="480" y1="0" x2="480" y2="375"/>
    <line x1="0" y1="37" x2="600" y2="37"/><line x1="0" y1="112" x2="600" y2="112"/>
    <line x1="0" y1="187" x2="600" y2="187"/><line x1="0" y1="262" x2="600" y2="262"/>
    <line x1="0" y1="337" x2="600" y2="337"/>
    <line x1="60" y1="0" x2="60" y2="375"/><line x1="180" y1="0" x2="180" y2="375"/>
    <line x1="300" y1="0" x2="300" y2="375"/><line x1="420" y1="0" x2="420" y2="375"/>
    <line x1="540" y1="0" x2="540" y2="375"/>
  </g>

  <!-- Concentric sound wave rings -->
  <g fill="none" stroke="#6B7DA8" opacity="0.15">
    <circle cx="300" cy="160" r="50" stroke-dasharray="6 4"/>
    <circle cx="300" cy="160" r="80" stroke-dasharray="8 6"/>
    <circle cx="300" cy="160" r="110" stroke-dasharray="10 8"/>
    <circle cx="300" cy="160" r="140" stroke-dasharray="12 10"/>
  </g>

  <!-- Microphone icon (larger, bolder) -->
  <g transform="translate(280,130)" fill="none" stroke="#8B9DC3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
    <rect x="14" y="2" width="12" height="26" rx="6"/>
    <path d="M34 18v4a14 14 0 0 1-28 0v-4"/>
    <line x1="20" y1="30" x2="20" y2="38"/>
    <line x1="13" y1="38" x2="27" y2="38"/>
  </g>

  <!-- Sound wave bars (left side) -->
  <g transform="translate(120,140)" fill="#6B7DA8" opacity="0.2">
    <rect x="0" y="12" width="4" height="16" rx="2"/><rect x="8" y="6" width="4" height="28" rx="2"/>
    <rect x="16" y="0" width="4" height="40" rx="2"/><rect x="24" y="8" width="4" height="24" rx="2"/>
    <rect x="32" y="14" width="4" height="12" rx="2"/>
  </g>
  <!-- Sound wave bars (right side) -->
  <g transform="translate(420,140)" fill="#6B7DA8" opacity="0.2">
    <rect x="0" y="14" width="4" height="12" rx="2"/><rect x="8" y="8" width="4" height="24" rx="2"/>
    <rect x="16" y="0" width="4" height="40" rx="2"/><rect x="24" y="6" width="4" height="28" rx="2"/>
    <rect x="32" y="12" width="4" height="16" rx="2"/>
  </g>

  <!-- Waveform line at bottom -->
  <path d="M0 310 Q30 295, 60 310 T120 310 T180 310 T240 310 T300 310 T360 310 T420 310 T480 310 T540 310 T600 310" fill="none" stroke="#6B7DA8" stroke-width="1" opacity="0.12"/>
  <path d="M0 320 Q30 305, 60 320 T120 320 T180 320 T240 320 T300 320 T360 320 T420 320 T480 320 T540 320 T600 320" fill="none" stroke="#6B7DA8" stroke-width="0.8" opacity="0.08"/>

  <!-- Corner accents -->
  <g stroke="#6B7DA8" stroke-width="1" opacity="0.15">
    <line x1="20" y1="20" x2="50" y2="20"/><line x1="20" y1="20" x2="20" y2="50"/>
    <line x1="580" y1="20" x2="550" y2="20"/><line x1="580" y1="20" x2="580" y2="50"/>
    <line x1="20" y1="355" x2="50" y2="355"/><line x1="20" y1="355" x2="20" y2="325"/>
    <line x1="580" y1="355" x2="550" y2="355"/><line x1="580" y1="355" x2="580" y2="325"/>
  </g>
</svg>
