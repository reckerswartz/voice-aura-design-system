<svg xmlns="http://www.w3.org/2000/svg" width="600" height="375" viewBox="0 0 600 375">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
    <radialGradient id="glow3" cx="0.5" cy="0.45" r="0.4">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="375" fill="url(#bg3)"/>
  <rect width="600" height="375" fill="url(#glow3)"/>

  <!-- Grid overlay -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="75" x2="600" y2="75"/><line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="225" x2="600" y2="225"/><line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="120" y1="0" x2="120" y2="375"/><line x1="240" y1="0" x2="240" y2="375"/>
    <line x1="360" y1="0" x2="360" y2="375"/><line x1="480" y1="0" x2="480" y2="375"/>
  </g>

  <!-- Sound wave bars (centered, vertical) -->
  <g transform="translate(250,110)" fill="#7dd3fc" opacity="0.25">
    <rect x="0" y="30" width="6" height="40" rx="3"/><rect x="12" y="20" width="6" height="60" rx="3"/>
    <rect x="24" y="8" width="6" height="84" rx="3"/><rect x="36" y="0" width="6" height="100" rx="3"/>
    <rect x="48" y="15" width="6" height="70" rx="3"/><rect x="60" y="5" width="6" height="90" rx="3"/>
    <rect x="72" y="0" width="6" height="100" rx="3"/><rect x="84" y="12" width="6" height="76" rx="3"/>
    <rect x="96" y="25" width="6" height="50" rx="3"/>
  </g>

  <!-- Neural network nodes and connections -->
  <g fill="#7dd3fc" opacity="0.2">
    <circle cx="150" cy="100" r="4"/><circle cx="450" cy="100" r="4"/>
    <circle cx="150" cy="275" r="4"/><circle cx="450" cy="275" r="4"/>
    <circle cx="300" cy="60" r="3"/><circle cx="300" cy="315" r="3"/>
    <circle cx="200" cy="185" r="3"/><circle cx="400" cy="185" r="3"/>
    <circle cx="100" cy="185" r="2.5"/><circle cx="500" cy="185" r="2.5"/>
  </g>
  <g fill="none" stroke="#7dd3fc" stroke-width="0.8" opacity="0.08">
    <line x1="150" y1="100" x2="300" y2="60"/><line x1="450" y1="100" x2="300" y2="60"/>
    <line x1="150" y1="100" x2="200" y2="185"/><line x1="450" y1="100" x2="400" y2="185"/>
    <line x1="200" y1="185" x2="150" y2="275"/><line x1="400" y1="185" x2="450" y2="275"/>
    <line x1="150" y1="275" x2="300" y2="315"/><line x1="450" y1="275" x2="300" y2="315"/>
    <line x1="200" y1="185" x2="400" y2="185"/>
    <line x1="100" y1="185" x2="200" y2="185"/><line x1="400" y1="185" x2="500" y2="185"/>
    <line x1="100" y1="185" x2="150" y2="100"/><line x1="500" y1="185" x2="450" y2="100"/>
    <line x1="100" y1="185" x2="150" y2="275"/><line x1="500" y1="185" x2="450" y2="275"/>
  </g>

  <!-- Chat bubble hints -->
  <g fill="none" stroke="#7dd3fc" stroke-width="1.5" opacity="0.15">
    <rect x="250" y="250" width="100" height="40" rx="8"/>
    <polygon points="270,290 280,290 265,305" fill="none" stroke="#7dd3fc"/>
  </g>
  <g fill="#7dd3fc" opacity="0.1">
    <rect x="260" y="260" width="40" height="4" rx="2"/>
    <rect x="260" y="270" width="60" height="4" rx="2"/>
    <rect x="260" y="280" width="30" height="4" rx="2"/>
  </g>

  <!-- Corner accents -->
  <g stroke="#7dd3fc" stroke-width="1" opacity="0.15">
    <line x1="20" y1="20" x2="50" y2="20"/><line x1="20" y1="20" x2="20" y2="50"/>
    <line x1="580" y1="20" x2="550" y2="20"/><line x1="580" y1="20" x2="580" y2="50"/>
    <line x1="20" y1="355" x2="50" y2="355"/><line x1="20" y1="355" x2="20" y2="325"/>
    <line x1="580" y1="355" x2="550" y2="355"/><line x1="580" y1="355" x2="580" y2="325"/>
  </g>
</svg>
