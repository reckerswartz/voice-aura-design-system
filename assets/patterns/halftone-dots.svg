  <circle cx="260" cy="260" r="5.0" opacity="0.38"/>
  <circle cx="300" cy="260" r="3.8" opacity="0.28"/>
  <circle cx="340" cy="260" r="2.6" opacity="0.18"/>
  <circle cx="380" cy="260" r="2.0" opacity="0.12"/>

  <!-- Row 8 — largest dots -->
  <circle cx="40"  cy="300" r="3.0" opacity="0.22"/>
  <circle cx="80"  cy="300" r="4.4" opacity="0.34"/>
  <circle cx="120" cy="300" r="5.8" opacity="0.46"/>
  <circle cx="160" cy="300" r="7.0" opacity="0.58"/>
  <circle cx="200" cy="300" r="7.6" opacity="0.65"/>
  <circle cx="240" cy="300" r="7.0" opacity="0.58"/>
  <circle cx="280" cy="300" r="5.8" opacity="0.46"/>
  <circle cx="320" cy="300" r="4.4" opacity="0.34"/>
  <circle cx="360" cy="300" r="3.0" opacity="0.22"/>

  <!-- Row 9 — bottom, peak density -->
  <circle cx="20"  cy="340" r="3.4" opacity="0.26"/>
  <circle cx="60"  cy="340" r="5.0" opacity="0.40"/>
  <circle cx="100" cy="340" r="6.4" opacity="0.52"/>
  <circle cx="140" cy="340" r="7.6" opacity="0.65"/>
  <circle cx="180" cy="340" r="8.4" opacity="0.72"/>
  <circle cx="220" cy="340" r="7.6" opacity="0.65"/>
  <circle cx="260" cy="340" r="6.4" opacity="0.52"/>
  <circle cx="300" cy="340" r="5.0" opacity="0.40"/>
  <circle cx="340" cy="340" r="3.4" opacity="0.26"/>
  <circle cx="380" cy="340" r="2.6" opacity="0.18"/>

  <!-- Row 10 — bottom edge -->
  <circle cx="40"  cy="380" r="3.8" opacity="0.30"/>
  <circle cx="80"  cy="380" r="5.4" opacity="0.44"/>
  <circle cx="120" cy="380" r="7.0" opacity="0.58"/>
  <circle cx="160" cy="380" r="8.2" opacity="0.70"/>
  <circle cx="200" cy="380" r="9.0" opacity="0.78"/>
  <circle cx="240" cy="380" r="8.2" opacity="0.70"/>
  <circle cx="280" cy="380" r="7.0" opacity="0.58"/>
  <circle cx="320" cy="380" r="5.4" opacity="0.44"/>
  <circle cx="360" cy="380" r="3.8" opacity="0.30"/>
</svg>
