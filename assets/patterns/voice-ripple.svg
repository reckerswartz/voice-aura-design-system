<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <!-- Voice Aura — Abstract voice/sound propagation ripple rings.
       Unlike concentric-rings.svg (uniform geometric), these rings vary in
       stroke-width and opacity to evoke organic sound propagation from a
       central source, matching the audio-tech aesthetic of the Behance
       reference (behance-04, behance-05, behance-07). -->
  <!-- Outer rings — very faint -->
  <circle cx="400" cy="400" r="380" stroke="#1A1919" stroke-width="0.5" opacity="0.03"/>
  <circle cx="400" cy="400" r="340" stroke="#1A1919" stroke-width="0.6" opacity="0.04"/>
  <circle cx="400" cy="400" r="300" stroke="#1A1919" stroke-width="0.8" opacity="0.05"/>
  <!-- Mid rings — subtle pulse feel -->
  <circle cx="400" cy="400" r="260" stroke="#1A1919" stroke-width="1" opacity="0.06"/>
  <circle cx="400" cy="400" r="220" stroke="#1A1919" stroke-width="1.2" opacity="0.07"/>
  <circle cx="400" cy="400" r="180" stroke="#1A1919" stroke-width="1.5" opacity="0.08"/>
  <!-- Inner rings — stronger, tighter spacing -->
  <circle cx="400" cy="400" r="145" stroke="#1A1919" stroke-width="1.8" opacity="0.09"/>
  <circle cx="400" cy="400" r="115" stroke="#1A1919" stroke-width="2" opacity="0.10"/>
  <circle cx="400" cy="400" r="90" stroke="#1A1919" stroke-width="2.2" opacity="0.11"/>
  <circle cx="400" cy="400" r="68" stroke="#1A1919" stroke-width="2.5" opacity="0.12"/>
  <circle cx="400" cy="400" r="50" stroke="#1A1919" stroke-width="2.8" opacity="0.13"/>
  <!-- Core — solid dot at source point -->
  <circle cx="400" cy="400" r="6" fill="#1A1919" opacity="0.15"/>
</svg>
