<?xml version="1.0" encoding="UTF-8"?>
<!-- Voice Aura Design System — noise-texture.svg
     SVG noise / grain texture overlay (200×200, tileable).
     Usage: overlay on section backgrounds to add subtle film-grain texture.
     Apply via CSS background-image or as an inline <img> with mix-blend-mode.
     Uses feTurbulence fractalNoise for organic grain and feColorMatrix
     to desaturate to greyscale. Overall opacity 0.03 keeps it barely visible. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"
     width="200" height="200">
  <filter id="noiseFilter">
    <feTurbulence type="fractalNoise" baseFrequency="0.65"
                  numOctaves="3" stitchTiles="stitch" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise"/>
  </filter>
  <rect width="200" height="200" filter="url(#noiseFilter)" opacity="0.03"/>
</svg>
