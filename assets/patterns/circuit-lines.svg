<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" fill="none">
  <!-- Voice Aura — Abstract circuit / tech lines pattern
       Subtle interconnected paths with node dots, evocative of
       AI processing and signal routing. -->
  <defs>
    <radialGradient id="cg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1A1919" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#1A1919" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#cg)"/>
  <g stroke="#1A1919" stroke-opacity="0.06" stroke-width="1" fill="none">
    <!-- Horizontal paths -->
    <path d="M0 80h120l20 20h160l20-20h80"/>
    <path d="M400 80h80l20 20h100l20-20h180"/>
    <path d="M0 200h200l30 30h140l30-30h100"/>
    <path d="M500 200h60l20 20h120l20-20h80"/>
    <path d="M0 320h160l20-20h100l20 20h200"/>
    <path d="M500 320h80l20-20h80l20 20h100"/>
    <!-- Vertical paths -->
    <path d="M200 0v80l20 20v100l-20 20v80"/>
    <path d="M400 0v120l-20 20v40l20 20v200"/>
    <path d="M600 0v100l20 20v60l-20 20v200"/>
    <!-- Diagonal connectors -->
    <path d="M120 80l80 120"/>
    <path d="M400 80l-60 120"/>
    <path d="M600 120l-100 80"/>
    <path d="M200 300l60-100"/>
    <path d="M500 200l100 120"/>
  </g>
  <!-- Node dots at intersections -->
  <g fill="#0478FF" fill-opacity="0.12">
    <circle cx="120" cy="80" r="3"/>
    <circle cx="320" cy="100" r="3"/>
    <circle cx="400" cy="80" r="3"/>
    <circle cx="500" cy="100" r="3"/>
    <circle cx="200" cy="200" r="3"/>
    <circle cx="500" cy="200" r="3"/>
    <circle cx="600" cy="120" r="3"/>
    <circle cx="160" cy="320" r="3"/>
    <circle cx="500" cy="320" r="3"/>
    <circle cx="400" cy="200" r="4"/>
    <circle cx="200" cy="80" r="2.5"/>
    <circle cx="600" cy="200" r="2.5"/>
    <circle cx="300" cy="300" r="2.5"/>
    <circle cx="680" cy="320" r="2.5"/>
  </g>
</svg>
